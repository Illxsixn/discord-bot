name: Sync PRs with master

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Update open PR branches from master
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const upstream = `${owner}/${repo}`;

            const { data: prs } = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              base: 'master',
              per_page: 100,
            });

            if (prs.length === 0) {
              console.log('No open PRs targeting master.');
              return;
            }

            for (const pr of prs) {
              if (pr.draft) {
                console.log(`Skip draft PR #${pr.number}`);
                continue;
              }

              if (pr.head.repo.full_name !== upstream) {
                console.log(`Skip fork PR #${pr.number} (${pr.head.repo.full_name})`);
                continue;
              }

              try {
                await github.rest.pulls.updateBranch({
                  owner,
                  repo,
                  pull_number: pr.number,
                });
                console.log(`Synced PR #${pr.number}: ${pr.title}`);
              } catch (error) {
                console.log(`Failed PR #${pr.number}: ${error.message}`);
              }
            }
